{% extends 'shared/base_publica.html' %}
{% block subtitulo %}Entrar{% endblock %}
{% block conteudo %}
<div class="row">
    <div class="col-6 offset-3">
        <form action="/post_entrar" method="post">
            <div class="card">
                <div class="card-header">
                    <h3>Entrar</h3>
                </div>
                <div class="card-body">
                    <div class="form-floating">
                        <input type="email" class="form-control" id="email" name="email" placeholder="E-mail">
                        <label for="email">E-mail</label>
                    </div>
                    <div class="form-floating mt-3">
                        <input type="password" class="form-control" id="senha" name="senha" placeholder="Senha">
                        <label for="senha">Senha</label>
                    </div>
                </div>
                <div class="card-footer">
                    <button class="btn btn-primary mt-2">Entrar</button>
                    <div class="mt-3">
                        Não é cadastrado? <a href="/cadastrar">Clique aqui</a> para se cadastrar.
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
